<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/demostyle.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" />
    <title>Document</title>
</head>

<header>
    <nav style="
            position: sticky; 
            /* top: 0.5rem; */
            height: 4rem;
            background: var(--color-nav-bg); 
            color: #fff; 
            z-index: 1000; 
            padding: 0.5rem 1.5rem; 
            box-shadow: 0 2px 12px rgba(0,0,0,0.35);
            display: flex;
            justify-content: center;
        ">
        <div
            style="display: flex; align-items: center; margin-right: 2rem; position: absolute; left: 1.5rem; top: 0; bottom: 0; height: 100%;">
            <a href="/" style="display: flex; align-items: center; text-decoration: none; color: #fff;">
                <img id="logo-img" src="/docs/branding/cyberstout_banner_3.png" alt="Logo"
                    style="height: 2rem; margin-right: 0.5rem;">
            </a>
        </div>
        <ul style="display: flex; justify-content: center; margin: 0; padding: 0; list-style: none; width: 100%;">
            <li style="display: flex; align-items: center; margin: 0 1rem; height: 100%;">
                <a href="/"
                    style="color: #fff; text-decoration: none; display: flex; align-items: center; height: 100%;">Home</a>
            </li>
            <li style="display: flex; align-items: center; margin: 0 1rem; height: 100%;">
                <a href="/about"
                    style="color: #fff; text-decoration: none; display: flex; align-items: center; height: 100%;">About</a>
            </li>
            <li style="display: flex; align-items: center; margin: 0 1rem; height: 100%;">
                <a href="/contact"
                    style="color: #fff; text-decoration: none; display: flex; align-items: center; height: 100%;">Contact</a>
            </li>
            <li style="display: flex; align-items: center; margin: 0 1rem; height: 100%;">
                <a href="/gallery"
                    style="color: #fff; text-decoration: none; display: flex; align-items: center; height: 100%;">Gallery</a>
            </li>
        </ul>
    </nav>
</header>


<body>
    <button id="theme-toggle">Toggle Theme</button>
    <script>
        const toggle = document.getElementById('theme-toggle');
        const root = document.documentElement;

        if (root.getAttribute('data-theme') === null) {
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            root.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
        }

        toggle.addEventListener('click', () => {
            const currentTheme = root.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            root.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
    <script>
        function updateLogo() {
            const theme = document.documentElement.getAttribute('data-theme');
            const logo = document.getElementById('logo-img');
            if (theme === 'dark') {
                logo.src = '/docs/branding/cyberstout_banner_2.png';
            } else {
                logo.src = '/docs/branding/cyberstout_banner_3.png';
            }
        }
        updateLogo();
        document.getElementById('theme-toggle').addEventListener('click', () => {
            setTimeout(updateLogo, 0);
        });
    </script>
</body>

</html>
